name: Publish Release

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    steps:
      - name: Ensure running on main
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "Error: this workflow must be dispatched from main (got $GITHUB_REF)"
            exit 1
          fi

      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Extract version
        id: version
        run: |
          # All publishable crates inherit the single [workspace.package] version.
          VERSION=$(sed -n '/^\[workspace\.package\]/,/^\[/ s/^version = "\([^"]*\)".*/\1/p' Cargo.toml | head -1)
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Version '$VERSION' is not a valid X.Y.Z version"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Check tag doesn't exist
        run: |
          if git tag -l "${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "Error: Tag ${{ steps.version.outputs.tag }} already exists"
            exit 1
          fi

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      # Publish to crates.io BEFORE creating the git tag and GitHub release, so a
      # failed publish never leaves a tag/release behind. If it fails before any
      # crate uploads, just re-run the workflow. If it fails mid-workspace (some
      # crates already uploaded), a re-run errors on the already-published ones:
      # publish the remaining crates manually with `cargo publish -p <crate>`,
      # and create the tag and GitHub release manually as well.
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --workspace --locked

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.version }}" \
            --generate-notes
